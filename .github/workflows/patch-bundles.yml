name: Patch Bundles

# Manually triggered to update dosbox.conf in all existing .jsdos bundles
# without re-downloading source archives.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout library repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: library-bot/package.json

      - name: Install bot dependencies
        working-directory: library-bot
        run: npm install

      - name: Patch dosbox.conf in all existing bundles
        run: npm --prefix library-bot run patch

      - name: Commit patched bundles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bundles
          git diff --cached --quiet || git commit -m "chore: patch dosbox.conf in all existing bundles"
          git push
