name: Library Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write

jobs:
  update-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout library repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: library-bot/package.json

      - name: Install bot dependencies
        working-directory: library-bot
        run: npm install

      - name: Run scrape + bundle + library generation
        env:
          CPLAY_BUNDLE_BASE_URL: https://raw.githubusercontent.com/YAL-PJ/dos-freeware-games-library/main/bundles
        run: npm --prefix library-bot run run

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add library.json bundles
          git diff --cached --quiet || git commit -m "chore: refresh DOS games library"
          git push
