name: Library Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write

jobs:
  update-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CPlay
        uses: actions/checkout@v4

      - name: Checkout bundle repository
        uses: actions/checkout@v4
        with:
          repository: YAL-PJ/dos-freeware-games-library
          path: external/dos-freeware-games-library
          token: ${{ secrets.DOS_LIBRARY_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/library-bot/package.json

      - name: Install bot dependencies
        working-directory: tools/library-bot
        run: npm install

      - name: Run scrape + bundle + library generation
        env:
          CPLAY_LIBRARY_REPO_PATH: ${{ github.workspace }}/external/dos-freeware-games-library
          CPLAY_BUNDLE_BASE_URL: https://raw.githubusercontent.com/YAL-PJ/dos-freeware-games-library/main/bundles
        run: npm --prefix tools/library-bot run run

      - name: Commit bundle updates
        working-directory: external/dos-freeware-games-library
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bundles
          git diff --cached --quiet || git commit -m "chore: update automated DOS bundles"
          git push

      - name: Commit library metadata updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add library.json tools/library-bot .github/workflows/library-bot.yml
          git diff --cached --quiet || git commit -m "chore: refresh automated game library"
          git push
